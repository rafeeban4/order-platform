server:
  port: 8081

spring:
  application:
    name: ingest-api
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:19092}
    template:
      observation-enabled: true # producer spans, trace context into record headers
    producer:
      acks: all
      # linger a hair to batch under load without hurting p99 meaningfully
      properties:
        linger.ms: 5

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  tracing:
    sampling:
      probability: ${TRACE_SAMPLING:1.0} # drop to ~0.05 for load runs
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
