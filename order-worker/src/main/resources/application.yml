server:
  port: 8082

spring:
  application:
    name: order-worker
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/orders}
    username: ${DB_USER:orders}
    password: ${DB_PASSWORD:orders_local_dev}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:19092}
    listener:
      observation-enabled: true # consumer spans linked to the producer trace
    consumer:
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
