server:
  port: 8082

spring:
  application:
    name: order-worker
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/orders}
    username: ${DB_USER:orders}
    password: ${DB_PASSWORD:orders_local_dev}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:19092}
    consumer:
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
